<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Global</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#0f172a,#1e293b);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .chat-container{
      width:95%;
      max-width:500px;
      height:90vh;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
      border-radius:20px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      border:1px solid rgba(255,255,255,0.1);
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .chat-header{
      padding:20px;
      text-align:center;
      background:rgba(255,255,255,0.05);
      border-bottom:1px solid rgba(255,255,255,0.1);
    }

    .chat-header h1{
      font-size:28px;
    }

    .chat-header p{
      opacity:0.7;
      margin-top:5px;
    }

    .messages{
      flex:1;
      padding:15px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .message{
      background:rgba(255,255,255,0.08);
      padding:12px;
      border-radius:12px;
      animation:fadeIn .3s ease;
    }

    .message strong{
      color:#38bdf8;
    }

    .chat-form{
      display:flex;
      gap:10px;
      padding:15px;
      background:rgba(255,255,255,0.05);
    }

    .chat-form input{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      outline:none;
      background:rgba(255,255,255,0.1);
      color:white;
    }

    .chat-form input::placeholder{
      color:rgba(255,255,255,0.6);
    }

    .chat-form button{
      padding:12px 18px;
      border:none;
      border-radius:10px;
      background:#38bdf8;
      color:white;
      cursor:pointer;
      transition:.3s;
    }

    .chat-form button:hover{
      background:#0ea5e9;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="chat-container">

  <div class="chat-header">
    <h1>🌍 Chat Global</h1>
    <p>Conectado en tiempo real</p>
  </div>

  <div id="messages" class="messages"></div>

  <form id="chatForm" class="chat-form">
    <input type="text" id="username" placeholder="Tu nombre" required>
    <input type="text" id="message" placeholder="Escribe un mensaje..." required>
    <button type="submit">Enviar</button>
  </form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQm1SC76r0bIaVIPw9Kv8YJ9rbJWgq_sI",
  authDomain: "mensajes-g4n1x.firebaseapp.com",
  projectId: "mensajes-g4n1x",
  storageBucket: "mensajes-g4n1x.firebasestorage.app",
  messagingSenderId: "496618955940",
  appId: "1:496618955940:web:bfae2677828d182fbb7231"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("chatForm");
const username = document.getElementById("username");
const message = document.getElementById("message");
const messages = document.getElementById("messages");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if(message.value.trim() === "") return;

  await addDoc(collection(db, "messages"), {
    username: username.value,
    text: message.value,
    createdAt: Date.now()
  });

  message.value = "";
});

const q = query(
  collection(db, "messages"),
  orderBy("createdAt")
);

onSnapshot(q, (snapshot) => {

  messages.innerHTML = "";

  snapshot.forEach((doc) => {

    const data = doc.data();

    const div = document.createElement("div");

    div.classList.add("message");

    div.innerHTML = `
      <strong>${data.username}</strong><br>
      ${data.text}
    `;

    messages.appendChild(div);

  });

  messages.scrollTop = messages.scrollHeight;

});

</script>

</body>
</html>
